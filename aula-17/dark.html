<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: "class"
        }
    </script>
</head>
<body>
    <body class="bg-white dark:bg-gray-900 text-black 
    dark:text-white min-h-screen 
    flex flex-col items-center justify-center">
        
    <button id="toggle-dark" class="mb-6 px-4 py-2 bg-blue-500 text-white rounded">Alternar dark mode</button>    

    <div class="p-6 rounded bg-gray-100 dark:bg-gray-800">Esse card muda com o dark mode</div>

    <script>
        const btn = document.getElementById('toggle-dark');
        btn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark')
        })
    </script>
    
</div>
</body>
</body>
</html>
